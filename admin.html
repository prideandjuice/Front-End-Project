<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Mochi Time</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background: #fff0f3;
            color: #2d2d2d;
            min-height: 100vh;
        }

        header {
            background: #fff;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 12px rgba(255,87,127,0.1);
        }

        .logo { font-size: 1.4rem; font-weight: 800; color: #ff577f; }

        a.back {
            text-decoration: none;
            color: #ff577f;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .container { max-width: 1100px; margin: 40px auto; padding: 0 24px; }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(255,87,127,0.1);
            text-align: center;
        }

        .stat-card .number {
            font-size: 2rem;
            font-weight: 800;
            color: #ff577f;
        }

        .stat-card .label {
            font-size: 0.85rem;
            color: #888;
            margin-top: 4px;
        }

        .table-wrap {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(255,87,127,0.1);
            overflow: hidden;
        }

        .table-header {
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ffe0e8;
        }

        .table-header h2 { font-size: 1.1rem; font-weight: 800; }

        .btn-refresh {
            background: #ff577f;
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 50px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-refresh:hover { background: #d63a5e; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        thead th {
            background: #fff0f3;
            padding: 12px 16px;
            text-align: left;
            font-weight: 700;
            color: #ff577f;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tbody tr {
            border-bottom: 1px solid #fff0f3;
            transition: background 0.15s;
        }

        tbody tr:hover { background: #fff8fa; }

        tbody td { padding: 14px 16px; color: #444; }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.78rem;
            font-weight: 700;
        }

        .badge-pending  { background: #fff3cd; color: #856404; }
        .badge-done     { background: #d1e7dd; color: #0a5c36; }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #aaa;
            font-size: 1rem;
        }

        .empty span { font-size: 3rem; display: block; margin-bottom: 12px; }

        #errorMsg {
            background: #ffe0e0;
            color: #c0392b;
            padding: 16px 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-weight: 600;
            display: none;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">🍡 Mochi Time — Admin</div>
    <a class="back" href="mochi.html">← Kembali ke Website</a>
</header>

<div class="container">

    <div id="errorMsg">
        Backend belum jalan. Jalankan dulu: <code>cd backend && npm run dev</code>
    </div>

    <div class="stats">
        <div class="stat-card">
            <div class="number" id="statTotal">-</div>
            <div class="label">Total Pesanan</div>
        </div>
        <div class="stat-card">
            <div class="number" id="statPending">-</div>
            <div class="label">Pending</div>
        </div>
        <div class="stat-card">
            <div class="number" id="statRevenue">-</div>
            <div class="label">Total Pendapatan</div>
        </div>
    </div>

    <div class="table-wrap">
        <div class="table-header">
            <h2>Daftar Pesanan</h2>
            <button class="btn-refresh" onclick="loadOrders()">↻ Refresh</button>
        </div>
        <div id="tableContent">
            <div class="empty"><span>⏳</span>Memuat data...</div>
        </div>
    </div>

</div>

<script>
    const FLAVOR_LABEL = {
        chocolate: 'Coklat', strawberry: 'Stroberi', matcha: 'Matcha',
        mango: 'Mangga', markisa: 'Markisa', oreo: 'Oreo', tiramisu: 'Tiramisu'
    };

    async function loadOrders() {
        try {
            const res = await fetch('http://localhost:3000/api/orders');
            if (!res.ok) throw new Error();
            const orders = await res.json();

            document.getElementById('errorMsg').style.display = 'none';
            renderStats(orders);
            renderTable(orders);
        } catch {
            document.getElementById('errorMsg').style.display = 'block';
            document.getElementById('tableContent').innerHTML =
                '<div class="empty"><span>🔌</span>Tidak bisa terhubung ke backend.</div>';
        }
    }

    function renderStats(orders) {
        const pending = orders.filter(o => o.status === 'pending').length;
        const revenue = orders.reduce((sum, o) => sum + o.total, 0);

        document.getElementById('statTotal').textContent   = orders.length;
        document.getElementById('statPending').textContent = pending;
        document.getElementById('statRevenue').textContent =
            'Rp ' + revenue.toLocaleString('id-ID');
    }

    function renderTable(orders) {
        if (orders.length === 0) {
            document.getElementById('tableContent').innerHTML =
                '<div class="empty"><span>📭</span>Belum ada pesanan masuk.</div>';
            return;
        }

        const rows = orders.map(o => `
            <tr>
                <td>#${o.id}</td>
                <td>${o.name}</td>
                <td>${o.email}</td>
                <td>${FLAVOR_LABEL[o.flavor] || o.flavor}</td>
                <td>${o.quantity} pcs</td>
                <td>Rp ${o.total.toLocaleString('id-ID')}</td>
                <td><span class="badge badge-${o.status}">${o.status}</span></td>
                <td>${new Date(o.created_at).toLocaleString('id-ID')}</td>
            </tr>
        `).join('');

        document.getElementById('tableContent').innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>ID</th><th>Nama</th><th>Email</th><th>Rasa</th>
                        <th>Qty</th><th>Total</th><th>Status</th><th>Waktu</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>
        `;
    }

    loadOrders();
</script>

</body>
</html>
